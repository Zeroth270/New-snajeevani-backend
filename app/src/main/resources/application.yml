  datasource:
    url: jdbc:postgresql://postgres:5433/Sanjeevani
    username: postgres
    password: Bankai
    driver-class-name: org.postgresql.Driver

anvesha:
  python-service:
    url: http://anvesha-chem:8001
  cors:
    allowed-origins: http://localhost:3000
